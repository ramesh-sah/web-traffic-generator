version: '3.8'

services:
  seo_booster:
    build: .
    container_name: seo_booster_pro
    ports:
      - "5000:5000"
    volumes:
      - ./SEO_BOOSTER_2025:/app/SEO_BOOSTER_2025
    restart: unless-stopped
    env_file:
      - .env.example

    # Critical fix for "Too many open files"
    ulimits:
      nofile:
        soft: 65535
        hard: 2097152

    