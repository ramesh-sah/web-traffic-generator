version: '3.8'

services:
  seo_booster:
    build: .
    container_name: seo_booster_pro
    ports:
      - "5000:5000"
    volumes:
      - ./SEO_BOOSTER_2025:/app/SEO_BOOSTER_2025
    restart: unless-stopped
    env_file:
      - .env.example

    # Fixed ulimits for Coolify (soft == hard to avoid permission error)
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    # Optional resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G