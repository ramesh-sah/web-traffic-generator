version: '3.8'

services:
  seo_booster:
    build: .
    container_name: seo_booster_pro
    ports:
      - "5000:5000"
    volumes:
      - ./SEO_BOOSTER_2025:/app/SEO_BOOSTER_2025
    restart: unless-stopped
    env_file:
      - .env.example

    # Critical fix for "Too many open files"
    ulimits:
      nofile:
        soft: 65535
        hard: 2097152

    # Resource limits (adjust according to your server)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G