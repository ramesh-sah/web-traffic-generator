<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Traffic Booster Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <div class="container">
        <header class="dashboard-header glass fade-in">
            <div class="brand">
                <i class="fa-solid fa-rocket text-gradient"></i>
                <h1>SEO <span>BOOSTER</span> PRO</h1>
            </div>
            <div class="status-indicator">
                <span id="status-dot" class="dot offline"></span>
                <span id="status-text">OFFLINE</span>
            </div>
        </header>

        <main class="grid-layout">
            <!-- Controls Section -->
            <section class="controls panel glass slide-up" style="animation-delay: 0.1s;">
                <h2>Current Target</h2>
                <div class="target-url-box">
                    <i class="fa-solid fa-link"></i>
                    <span id="target-url">Loading...</span>
                </div>
                
                <div class="action-buttons">
                    <button id="btn-start" class="btn btn-primary" onclick="toggleBot('start')">
                        <i class="fa-solid fa-play"></i> Start Bot
                    </button>
                    <button id="btn-stop" class="btn btn-danger" onclick="toggleBot('stop')" disabled>
                        <i class="fa-solid fa-stop"></i> Stop Bot
                    </button>
                </div>
            </section>

            <!-- Quick Stats Section -->
            <section class="quick-stats slide-up" style="animation-delay: 0.2s;">
                <div class="stat-card glass">
                    <div class="stat-icon"><i class="fa-solid fa-eye"></i></div>
                    <div class="stat-content">
                        <h3>Total Visits</h3>
                        <p class="stat-value animate-numbers" id="val-visits">0</p>
                    </div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-icon text-purple"><i class="fa-solid fa-globe"></i></div>
                    <div class="stat-content">
                        <h3>Countries</h3>
                        <p class="stat-value animate-numbers" id="val-countries">0</p>
                    </div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-icon text-green"><i class="fa-brands fa-google"></i></div>
                    <div class="stat-content">
                        <h3>Google Clicks</h3>
                        <p class="stat-value animate-numbers" id="val-clicks">0</p>
                    </div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-icon text-orange"><i class="fa-solid fa-chart-line"></i></div>
                    <div class="stat-content">
                        <h3>Analytics Fired</h3>
                        <p class="stat-value animate-numbers" id="val-analytics">0</p>
                    </div>
                </div>
            </section>

            <!-- Detailed Telemetry -->
            <section class="telemetry panel glass slide-up" style="animation-delay: 0.3s;">
                <h2>Live Telemetry</h2>
                <div class="telemetry-grid">
                    <div class="telemetry-item">
                        <span class="label">Threads Active</span>
                        <span class="value" id="val-threads">0</span>
                    </div>
                    <div class="telemetry-item">
                        <span class="label">Working Proxies</span>
                        <span class="value" id="val-proxies">0</span>
                    </div>
                    <div class="telemetry-item">
                        <span class="label">Uptime</span>
                        <span class="value font-mono" id="val-uptime">00:00:00</span>
                    </div>
                    <div class="telemetry-item full-width">
                        <span class="label">Top Countries</span>
                        <span class="value text-sm" id="val-top-countries">WAITING FOR DATA...</span>
                    </div>
                </div>
            </section>
        </main>
        
        <footer class="glass fade-in" style="animation-delay: 0.4s;">
            <p>SEO MASTERPIECE 2025 | 100% REAL CHROME 131 PATH SIMULATION</p>
        </footer>
    </div>

    <script>
        let pollInterval;

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                updateDashboard(data);
            } catch (err) {
                console.error("Failed to fetch stats", err);
            }
        }

        function updateDashboard(data) {
            // Update Text Values
            document.getElementById('val-visits').innerText = data.visits.toLocaleString();
            document.getElementById('val-countries').innerText = data.unique_countries;
            document.getElementById('val-clicks').innerText = data.search_clicks.toLocaleString();
            document.getElementById('val-analytics').innerText = data.analytics_fired.toLocaleString();
            
            document.getElementById('val-threads').innerText = data.is_running ? data.threads : 0;
            document.getElementById('val-proxies').innerText = data.active_proxies;
            document.getElementById('val-uptime').innerText = formatTime(data.uptime);
            document.getElementById('val-top-countries').innerText = data.countries_str;
            document.getElementById('target-url').innerText = data.target_url;

            // Update Status Banner
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            const btnStart = document.getElementById('btn-start');
            const btnStop = document.getElementById('btn-stop');

            if (data.is_running) {
                dot.className = 'dot online pulse';
                text.innerText = 'ONLINE & BOOSTING';
                btnStart.disabled = true;
                btnStop.disabled = false;
            } else {
                dot.className = 'dot offline';
                text.innerText = 'OFFLINE';
                btnStart.disabled = false;
                btnStop.disabled = true;
            }
        }

        async function toggleBot(action) {
            try {
                const res = await fetch(`/api/bot/${action}`, { method: 'POST' });
                const result = await res.json();
                if(result.success) {
                    fetchStats(); // Force immediate update
                }
            } catch (err) {
                alert("Failed to communicate with server");
            }
        }

        // Initialize polling
        fetchStats();
        pollInterval = setInterval(fetchStats, 2000); // 2 second polling
    </script>
</body>
</html>
